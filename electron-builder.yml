appId: com.erayakkaya.gameanalytics
productName: Game Analytics
directories:
  output: release
files:
  - out/**
  - package.json
  - "!node_modules/**"
  - node_modules/better-sqlite3/**
  - node_modules/bindings/**
  - node_modules/file-uri-to-path/**
extraResources:
  - from: drizzle
    to: drizzle
win:
  target: nsis
nsis:
  oneClick: true
  deleteAppDataOnUninstall: false
