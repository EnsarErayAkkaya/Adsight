appId: com.erayakkaya.adsight
productName: Adsight
directories:
  output: release
files:
  - out/**
  - package.json
  - "!node_modules/**"
  - node_modules/better-sqlite3/**
  - node_modules/bindings/**
  - node_modules/file-uri-to-path/**
extraResources:
  - from: drizzle
    to: drizzle
win:
  target: nsis
  # electron-builder converts the PNG to the multi-size .ico automatically.
  icon: public/adsight.png
nsis:
  oneClick: true
  deleteAppDataOnUninstall: false
